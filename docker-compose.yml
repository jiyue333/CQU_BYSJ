# Docker Compose 配置
# 基于YOLO的实时人流计数与密度分析系统

version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - crowd-flow-network

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=sqlite:///data/crowdflow.db
    networks:
      - crowd-flow-network

  # Redis 缓存服务（可选，用于实时推理结果缓存）
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - crowd-flow-network

networks:
  crowd-flow-network:
    driver: bridge

volumes:
  redis_data:
