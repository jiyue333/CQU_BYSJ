# Docker Compose 配置
# CrowdFlow - 人流密度分析系统

services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: crowdflow-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
      - UPLOAD_DIR=/uploads/videos
      - MODEL_DIR=/models
      - LOGS_DIR=/logs
    volumes:
      - ./data:/data
      - ./uploads:/uploads
      - ./models:/models
      - ./logs:/logs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - crowdflow-network

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_URL: "http://localhost:${BACKEND_PORT:-8000}"
    container_name: crowdflow-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - crowdflow-network

networks:
  crowdflow-network:
    driver: bridge
