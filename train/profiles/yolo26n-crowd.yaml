# YOLO26n crowd detection training profile
# 基于官方 YOLO26n 训练秘籍默认参数
# https://docs.ultralytics.com/zh/guides/yolo26-training-recipe/
model: yolo26n-p2-crowd.yaml
data: ul://juliet-heath/datasets/crowdhuman-dataset-people-and-faces-19k

# Training Settings
pretrained: /root/cqu/runs/train5/best.pt
epochs: 245
batch: 32
imgsz: 640
patience: 15
amp: true
cos_lr: true
close_mosaic: 10
save_period: -1
fraction: 1
freeze: null
single_cls: false
rect: false
multi_scale: 0.25
resume: false
optimizer: auto
lr0: 0.01
lrf: 0.0495
momentum: 0.937
weight_decay: 0.00064
warmup_epochs: 0.98
warmup_momentum: 0.8
warmup_bias_lr: 0.1
box: 5.63
cls: 0.56
dfl: 9.04
rep: 0.5
nwd: 0.3
nwd_threshold: 1024
pose: 12
kobj: 1
label_smoothing: 0

# Image Augmentations
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 1.11
translate: 0.1
scale: 0.9
shear: 1.46
perspective: 0
flipud: 0
fliplr: 0.6
mosaic: 0.909
mixup: 0.012
copy_paste: 0.075

