# ============================================================
# 统一训练基础配置
# 所有模型训练共享此配置，模型专属配置在 profiles/ 中覆盖
# ============================================================

# --- 设备 ---
device: mps                  # Apple Silicon GPU (可选: cpu, 0, [0,1], mps)

# --- 数据 ---
data: coco8.yaml             # 数据集配置文件 (相对或绝对路径)
imgsz: 640                   # 输入图像尺寸

# --- 训练轮次与早停 ---
epochs: 100                  # 总训练轮数
patience: 20                 # 验证指标无提升时提前停止的轮数
batch: 16                    # 批大小 (-1 = 自动, 0.7 = 70% GPU显存)

# --- 优化器 ---
optimizer: auto              # auto | SGD | MuSGD | AdamW | Adam | NAdam | RAdam
lr0: 0.01                    # 初始学习率
lrf: 0.01                    # 最终学习率 = lr0 * lrf
momentum: 0.937              # SGD 动量 / Adam beta1
weight_decay: 0.0005         # L2 正则化
cos_lr: false                # 余弦学习率调度

# --- 预热 ---
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# --- 保存与恢复 ---
save: true
save_period: -1              # 每 N 轮保存 (-1 = 只保存 best/last)
resume: false                # 从上次检查点恢复
exist_ok: false              # 是否覆盖已有输出目录

# --- 输出 ---
project: runs/train          # 输出根目录
verbose: true
plots: true

# --- 其他 ---
seed: 0
deterministic: true
amp: true                    # 混合精度训练
workers: 4                   # 数据加载线程数 (MPS 建议 <= 4)
cache: false                 # 图像缓存: false | true(RAM) | disk
rect: false                  # 矩形训练
single_cls: false
multi_scale: 0.0
close_mosaic: 10             # 最后 N 轮关闭 mosaic 增强
pretrained: true
freeze: null                 # 冻结前 N 层 (null = 不冻结)

# --- 数据增强 ---
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.0
