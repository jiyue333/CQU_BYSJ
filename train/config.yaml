# ============================================================
# 统一训练基础配置
# 所有模型训练共享此配置，模型专属配置在 profiles/ 中覆盖
# ============================================================

# --- 设备 ---
device: 0                  # Apple Silicon GPU (可选: cpu, 0, [0,1], mps)

# --- 数据 ---
data: coco8.yaml             # 数据集配置文件 (相对或绝对路径)

# Training Settings
pretrained: true
epochs: 200
batch: 32
imgsz: 640
patience: 10
amp: true
cos_lr: true
close_mosaic: 10
save_period: -1
fraction: 1
freeze: null
single_cls: false
rect: false
multi_scale: 0.25
resume: false
optimizer: auto
lr0: 0.0054
lrf: 0.0495
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3
warmup_momentum: 0.8
warmup_bias_lr: 0.1
box: 5.63
cls: 0.56
dfl: 9.04
pose: 12
kobj: 1
label_smoothing: 0

# Image Augmentations
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0
translate: 0.1
scale: 0.5
shear: 0
perspective: 0
flipud: 0
fliplr: 0.5
mosaic: 1
mixup: 0
copy_paste: 0.0
