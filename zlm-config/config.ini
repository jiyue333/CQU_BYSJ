# ZLMediaKit 配置文件
# 详细配置说明：https://github.com/ZLMediaKit/ZLMediaKit/wiki/配置文件详解

[api]
# API 密钥，用于鉴权
# 重要：此值必须与 .env 文件中的 ZLM_SECRET 保持一致
secret=your_api_secret_here_change_in_production

# API 服务端口（默认 80）
apiPort=80

# 是否启用 HTTPS API
ssl=0

[general]
# 流媒体服务器名称
mediaServerId=crowd-counting-zlm

# 无人观看自动关闭流的延迟时间（毫秒）
# 60000ms = 60秒，与设计文档中的 AUTO_STOP_DELAY 配合
streamNoneReaderDelayMS=60000

# 是否启用虚拟主机
enableVhost=1

# 流量统计事件触发间隔（秒）
flowThreshold=1024

# 最大连接数
maxConnection=512

[hls]
# HLS 切片时长（秒）
segDur=2

# HLS 切片数量
segNum=3

# HLS 文件保存路径
filePath=./www

# 是否删除过期的 HLS 切片
segRetain=0

[http]
# HTTP 服务端口
port=80

# HTTPS 服务端口
sslport=443

# 根目录
rootPath=./www

# 虚拟目录
dirMenu=0

[rtsp]
# RTSP 服务端口
port=554

# RTSP 拉流超时时间（秒）
timeoutSec=10

# 是否启用 RTSP over HTTP
directProxy=1

[rtmp]
# RTMP 服务端口
port=1935

[rtp]
# RTP 服务端口
port=10000

[rtp_proxy]
# RTP 代理端口范围
port=10000

# 超时时间（秒）
timeoutSec=15

[record]
# 是否启用录制
enableRecord=0

# 录制文件路径
filePath=./www/record

[hook]
# 是否启用 HTTP 回调
enable=0

# 回调地址（如需要可配置）
# on_publish=http://127.0.0.1:8000/api/hook/on_publish
# on_play=http://127.0.0.1:8000/api/hook/on_play
# on_stream_changed=http://127.0.0.1:8000/api/hook/on_stream_changed
# on_stream_none_reader=http://127.0.0.1:8000/api/hook/on_stream_none_reader

[cluster]
# 是否启用集群
enable=0

[protocol]
# 是否启用 MP4 录制
enable_mp4=0

# 是否启用 HLS
enable_hls=1

# 是否启用 RTSP
enable_rtsp=1

# 是否启用 RTMP
enable_rtmp=1

# 是否启用 HTTP-FLV
enable_http_flv=1

# 是否启用 WebSocket-FLV
enable_ws_flv=1

# 是否启用 WebRTC
enable_webrtc=1
