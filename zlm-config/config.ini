# ZLMediaKit 配置文件
# 详细配置说明：https://github.com/ZLMediaKit/ZLMediaKit/wiki/配置文件详解
# 
# 重要：此配置文件中的 secret 必须与 .env 文件中的 ZLM_SECRET 保持一致
# 修改后需要重启 ZLMediaKit 容器：docker-compose restart zlmediakit

[api]
# API 密钥，用于鉴权
# 重要：此值必须与 .env 文件中的 ZLM_SECRET 保持一致
secret=your_api_secret_here_change_in_production

# API 服务端口（默认 80）
apiPort=80

# 是否启用 HTTPS API
ssl=0

# 是否允许跨域请求
allow_cross_domains=1

# API 调试模式（生产环境建议关闭）
apiDebug=0

[general]
# 流媒体服务器名称
mediaServerId=crowd-counting-zlm

# 无人观看自动关闭流的延迟时间（毫秒）
# 60000ms = 60秒，与设计文档中的 AUTO_STOP_DELAY 配合
streamNoneReaderDelayMS=60000

# 是否启用虚拟主机
enableVhost=1

# 流量统计事件触发间隔（秒）
flowThreshold=1024

# 最大连接数
maxConnection=512

# 是否启用流量统计
enable_flow_report=0

# 是否启用 FFmpeg 日志
enable_ffmpeg_log=0

# FFmpeg 可执行文件路径（用于 addFFmpegSource）
ffmpeg_bin=/usr/bin/ffmpeg

# FFmpeg 命令模板（用于文件转流）
# %s 会被替换为实际参数
ffmpeg_cmd=%s -re -stream_loop -1 -i %s -c:v copy -c:a copy -f flv %s

# FFmpeg 快照命令模板
ffmpeg_snap=%s -i %s -y -f mjpeg -frames:v 1 -q:v 2 %s

[hls]
# HLS 切片时长（秒）
segDur=2

# HLS 切片数量
segNum=3

# HLS 文件保存路径
filePath=./www

# 是否删除过期的 HLS 切片
segRetain=0

# HLS 切片文件名格式
segKeep=0

[http]
# HTTP 服务端口
port=80

# HTTPS 服务端口
sslport=443

# 根目录
rootPath=./www

# 虚拟目录
dirMenu=0

# 是否允许发送大文件
sendBufSize=262144

# HTTP Keep-Alive 超时（秒）
keepAliveSecond=30

# 最大请求体大小（字节）- 用于文件上传等
maxReqSize=536870912

[rtsp]
# RTSP 服务端口
port=554

# RTSP 拉流超时时间（秒）
timeoutSec=10

# 是否启用 RTSP over HTTP
directProxy=1

# RTSP 认证方式（0: 无认证, 1: Basic, 2: Digest）
authBasic=0

# RTSP 低延迟模式
lowLatency=0

[rtmp]
# RTMP 服务端口
port=1935

# RTMP 握手超时（秒）
handshakeSecond=15

# RTMP Keep-Alive 超时（秒）
keepAliveSecond=15

[rtp]
# RTP 服务端口
port=10000

# RTP 超时时间（秒）
timeoutSec=15

[rtp_proxy]
# RTP 代理端口范围
port=10000

# 超时时间（秒）
timeoutSec=15

# 端口范围
port_range=10000-10500

[record]
# 是否启用录制
enableRecord=0

# 录制文件路径
filePath=./www/record

# 录制文件时长（秒）
fileSecond=3600

# 录制采样率
sampleMS=500

[hook]
# 是否启用 HTTP 回调
enable=0

# 回调超时时间（秒）
timeoutSec=10

# 回调重试次数
retry=1

# 回调地址（如需要可配置）
# on_publish=http://127.0.0.1:8000/api/hook/on_publish
# on_play=http://127.0.0.1:8000/api/hook/on_play
# on_stream_changed=http://127.0.0.1:8000/api/hook/on_stream_changed
# on_stream_none_reader=http://127.0.0.1:8000/api/hook/on_stream_none_reader

[cluster]
# 是否启用集群
enable=0

[protocol]
# 是否启用 MP4 录制
enable_mp4=0

# 是否启用 HLS
enable_hls=1

# 是否启用 RTSP
enable_rtsp=1

# 是否启用 RTMP
enable_rtmp=1

# 是否启用 HTTP-FLV
enable_http_flv=1

# 是否启用 WebSocket-FLV
enable_ws_flv=1

# 是否启用 WebRTC
enable_webrtc=1

# 是否启用 TS
enable_ts=0

# 是否启用 FMP4
enable_fmp4=0

[webrtc]
# WebRTC 端口
port=8000

# WebRTC 超时时间（秒）
timeoutSec=30

# 外部 IP（公网部署时需要配置）
# externIP=your_public_ip

# STUN 服务器
# stunServer=stun:stun.l.google.com:19302

# ICE 候选类型（host, srflx, relay）
# preferredInternetProtocol=ipv4
