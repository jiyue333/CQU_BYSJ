# Docker Compose GPU 扩展配置
# 人流计数与密度分析系统 - GPU 加速版本（方案 F）
#
# 使用方法：
#   docker-compose -f docker-compose.prod.yml -f docker-compose.gpu.yml up -d
#
# 前置要求：
#   1. NVIDIA GPU 驱动已安装
#   2. NVIDIA Container Toolkit 已安装
#      安装指南: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html

services:
  render:
    # 覆盖渲染服务配置以启用 GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      # 继承基础配置的环境变量
      REDIS_URL: redis://redis:6379/0
      ZLM_BASE_URL: http://zlmediakit:80
      ZLM_SECRET: ${ZLM_SECRET:-your_api_secret_here}
      ZLM_RTSP_PORT: 554
      ZLM_RTMP_PORT: 1935
      # 渲染配置
      RENDER_FPS: ${RENDER_FPS:-24}
      RENDER_INFER_STRIDE: ${RENDER_INFER_STRIDE:-3}
      RENDER_OVERLAY_ALPHA: ${RENDER_OVERLAY_ALPHA:-0.6}
      # 推理配置
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.5}
      HEATMAP_GRID_SIZE: ${HEATMAP_GRID_SIZE:-20}
      HEATMAP_DECAY: ${HEATMAP_DECAY:-0.3}
      COOLDOWN_DURATION: ${COOLDOWN_DURATION:-60}
      STREAM_RESULT_MAXLEN: ${STREAM_RESULT_MAXLEN:-500}
      STREAM_STATUS_MAXLEN: ${STREAM_STATUS_MAXLEN:-1000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: json
      # GPU 特定配置
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
